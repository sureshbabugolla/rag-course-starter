<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #0D1B2A;
      --navy-mid:   #112236;
      --navy-light: #1A3048;
      --teal:       #00C9A7;
      --teal-dim:   #007A65;
      --teal-glow:  rgba(0, 201, 167, 0.15);
      --orange:     #FF6B35;
      --white:      #F0F4F8;
      --gray:       #7A9BBF;
      --gray-dim:   #3A5068;
      --user-bg:    #1A3048;
      --bot-bg:     #112236;
      --border:     rgba(0, 201, 167, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--navy);
      color: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,201,167,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.03) 0%, transparent 50%);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 27, 42, 0.9);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dim));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 20px var(--teal-glow);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .logo-text span {
      color: var(--teal);
    }

    .header-badges {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .badge {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.25rem 0.6rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--gray);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge.live {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-glow);
      animation: pulse-badge 2s ease-in-out infinite;
    }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--gray-dim); border-radius: 4px; }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: slide-in 0.3s ease-out;
      max-width: 820px;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, var(--teal), var(--teal-dim));
      box-shadow: 0 0 12px var(--teal-glow);
    }

    .message.user .avatar {
      background: var(--navy-light);
      border: 1px solid var(--gray-dim);
    }

    .bubble {
      padding: 0.85rem 1.1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.65;
      max-width: 680px;
      word-break: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 2px;
      color: var(--white);
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(122, 155, 191, 0.2);
      border-top-right-radius: 2px;
      color: var(--white);
    }

    .bubble .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      font-weight: 700;
    }

    .message.bot .bubble .label { color: var(--teal); }
    .message.user .bubble .label { color: var(--gray); }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 0.4rem 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      animation: slide-in 0.5s ease-out;
    }

    .welcome-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px var(--teal-glow));
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .welcome p {
      color: var(--gray);
      font-size: 0.8rem;
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto 1.5rem;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 560px;
      margin: 0 auto;
    }

    .suggestion-btn {
      background: var(--navy-light);
      border: 1px solid var(--border);
      color: var(--gray);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .suggestion-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-glow);
    }

    /* ── Input area ── */
    .input-area {
      padding: 1.25rem 2rem 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--gray-dim); }

    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--teal), var(--teal-dim));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s ease;
      box-shadow: 0 0 16px var(--teal-glow);
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,201,167,0.35);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .input-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--gray-dim);
      margin-top: 0.6rem;
      letter-spacing: 0.03em;
    }

    /* ── Error state ── */
    .error-bubble {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.3);
      color: var(--orange);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    /* ── Stack info footer ── */
    .stack-info {
      display: flex;
      gap: 1rem;
      justify-content: center;
      padding: 0 2rem 0.5rem;
      flex-shrink: 0;
    }

    .stack-tag {
      font-size: 0.6rem;
      color: var(--gray-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stack-tag span { color: var(--teal); }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">RAG<span>Assistant</span></div>
    </div>
    <div class="header-badges">
      <div class="badge">Mistral 7B</div>
      <div class="badge">ChromaDB</div>
      <div class="badge">LangChain</div>
      <div class="badge live" id="status-badge">● Live</div>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>RAG Assistant</h2>
      <p>Ask anything about the ACME knowledge base. Answers are grounded in the documents — no hallucination.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="usesuggestion(this)">What is the return policy?</button>
        <button class="suggestion-btn" onclick="usesuggestion(this)">How do I contact support?</button>
        <button class="suggestion-btn" onclick="usesuggestion(this)">What products does ACME sell?</button>
        <button class="suggestion-btn" onclick="usesuggestion(this)">How does shipping work?</button>
        <button class="suggestion-btn" onclick="usesuggestion(this)">What is the warranty period?</button>
        <button class="suggestion-btn" onclick="usesuggestion(this)">What is the weather today?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea
          id="question-input"
          placeholder="Ask a question about the knowledge base..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendQuestion()" title="Send (Enter)">
        ➤
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>

  <!-- Stack info -->
  <div class="stack-info">
    <span class="stack-tag">LangChain <span>LCEL</span></span>
    <span class="stack-tag">·</span>
    <span class="stack-tag">ChromaDB <span>vector store</span></span>
    <span class="stack-tag">·</span>
    <span class="stack-tag">Ollama <span>local LLM</span></span>
    <span class="stack-tag">·</span>
    <span class="stack-tag">FastAPI <span>backend</span></span>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('question-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcome    = document.getElementById('welcome');

  function usesuggestion(btn) {
    inputEl.value = btn.textContent;
    autoResize(inputEl);
    sendQuestion();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content, isError = false) {
    // Hide welcome on first message
    if (welcome) welcome.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (isError) {
      bubble.innerHTML = `<div class="error-bubble">${content}</div>`;
    } else {
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'bot' ? 'RAG Assistant' : 'You';

      const text = document.createElement('div');
      text.textContent = content;

      bubble.appendChild(label);
      bubble.appendChild(text);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function addTypingIndicator() {
    if (welcome) welcome.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'RAG Assistant';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    bubble.appendChild(label);
    bubble.appendChild(indicator);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendQuestion() {
    const question = inputEl.value.trim();
    if (!question) return;

    // Add user message
    addMessage('user', question);

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Show typing indicator
    const typingMsg = addTypingIndicator();

    try {
      const response = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      removeTypingIndicator();

      if (!response.ok) {
        const err = await response.json();
        addMessage('bot', `⚠️ ${err.detail || 'Something went wrong. Please try again.'}`, true);
      } else {
        const data = await response.json();
        addMessage('bot', data.answer);
      }
    } catch (err) {
      removeTypingIndicator();
      addMessage('bot', '⚠️ Could not reach the server. Make sure the app is running.', true);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Check health on load
  async function checkHealth() {
    const badge = document.getElementById('status-badge');
    try {
      const res = await fetch('/health');
      const data = await res.json();
      if (data.rag_chain_ready) {
        badge.textContent = '● Live';
        badge.classList.add('live');
      } else {
        badge.textContent = '● Loading';
        badge.style.color = 'var(--orange)';
        setTimeout(checkHealth, 3000);
      }
    } catch {
      badge.textContent = '● Offline';
      badge.style.color = 'var(--orange)';
    }
  }

  checkHealth();
  inputEl.focus();
</script>
</body>
</html>
